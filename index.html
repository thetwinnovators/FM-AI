<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>temp-app</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500&display=swap" rel="stylesheet" />
    <script>
      // Pre-paint theme apply — runs before React mounts so the user never sees
      // a flash of the wrong theme. Mirrors src/lib/theme.js's storage key.
      (function () {
        try {
          var saved = localStorage.getItem('flowmap.theme')
          if (saved !== 'light' && saved !== 'dark') saved = 'dark'
          document.documentElement.setAttribute('data-theme', saved)
        } catch (_) {
          document.documentElement.setAttribute('data-theme', 'dark')
        }
      })()
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
